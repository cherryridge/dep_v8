name: Build on Linux

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      commit:
        type: string
        required: true
    secrets:
      googlesource_gitcookies:
        required: true
    outputs:
      runid:
        description: Run ID
        value: ${{github.run_id}}
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: Target version of V8.
        required: true
      commit:
        type: string
        description: Target commit of V8.
        required: true

jobs:
  x64-debug:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout This Repo
      uses: actions/checkout@v4
      with:
        clean: true
        fetch-depth: 1

    - name: Prepare
      uses: ./.github/actions/prepare
      with:
        googlesource_gitcookies: ${{secrets.googlesource_gitcookies}}

    - name: Remove Everything
      uses: ./.github/actions/linux-remove-everything

    - name: Fetch V8
      uses: ./.github/actions/fetch-v8
      with:
        commit: ${{inputs.commit}}

    - name: Apply Linux Patches
      uses: ./.github/actions/linux-patches

    - name: Build Linux x64 Debug
      shell: bash
      run: |
        df -h
        cd v8/v8
        gn gen out/x64.debug --args='v8_target_cpu="x64" target_cpu="x64" use_sysroot=false is_debug=true symbol_level=2 is_clang=true is_component_build=false v8_static_library=true clang_use_chrome_plugins=false v8_enable_pointer_compression=true use_custom_libcxx=false use_custom_libcxx_for_host=false use_clang_modules=false use_glib=false use_lld=true v8_enable_partition_alloc=false v8_monolithic=true v8_use_external_startup_data=false icu_use_data_file=false v8_enable_sandbox=false v8_enable_webassembly=true treat_warnings_as_errors=false enable_iterator_debugging=true v8_enable_verify_heap=true v8_enable_object_print=true v8_enable_backtrace=true v8_enable_temporal_support=false'
        ninja -C out/x64.debug -j 3 v8_monolith v8_hello_world

    - name: Test Product
      shell: bash
      run: |
        set -e
        chmod +x ./v8/v8/out/x64.debug/v8_hello_world
        output1=$(./v8/v8/out/x64.debug/v8_hello_world)
        if [[ "$output1" == "Hello, World!"* ]]; then
          echo "Debug test passed."
        else
          echo "Test failure: output is $output1"
          exit 1
        fi

    - name: Compress Product
      shell: bash
      run: |
        echo "${{inputs.version}}" >> VERSION.txt
        echo "${{inputs.commit}}" >> VERSION.txt
        mkdir -p temp/include
        cp -a ./v8/v8/include/* ./temp/include
        7z a v8_linux_x64_debug.7z ./v8/v8/out/x64.debug/obj/libv8_monolith.a ./temp/include VERSION.txt

    - name: Upload Archive
      uses: actions/upload-artifact@v4
      with:
        name: v8_linux_x64_debug
        path: |
          *.7z
        retention-days: 7

  x64-release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout This Repo
      uses: actions/checkout@v4
      with:
        clean: true
        fetch-depth: 1

    - name: Prepare
      uses: ./.github/actions/prepare
      with:
        googlesource_gitcookies: ${{secrets.googlesource_gitcookies}}

    - name: Remove Everything
      uses: ./.github/actions/linux-remove-everything

    - name: Fetch V8
      uses: ./.github/actions/fetch-v8
      with:
        commit: ${{inputs.commit}}

    - name: Apply Linux Patches
      uses: ./.github/actions/linux-patches

    - name: Build Linux x64 Release
      shell: bash
      run: |
        cd v8/v8
        gn gen out/x64.release --args='v8_target_cpu="x64" target_cpu="x64" use_sysroot=false is_debug=false symbol_level=0 is_clang=true is_component_build=false v8_static_library=true clang_use_chrome_plugins=false v8_enable_pointer_compression=true use_custom_libcxx=false use_custom_libcxx_for_host=false use_clang_modules=false use_glib=false use_lld=true v8_enable_partition_alloc=false v8_monolithic=true v8_use_external_startup_data=false icu_use_data_file=false v8_enable_sandbox=false v8_enable_webassembly=true treat_warnings_as_errors=false enable_iterator_debugging=false v8_enable_verify_heap="" v8_enable_object_print="" v8_enable_backtrace="" v8_enable_temporal_support=false'
        ninja -C out/x64.release -j 3 v8_monolith v8_hello_world

    - name: Test Product
      shell: bash
      run: |
        set -e
        chmod +x ./v8/v8/out/x64.release/v8_hello_world
        output2=$(./v8/v8/out/x64.release/v8_hello_world)
        if [[ "$output2" == "Hello, World!"* ]]; then
          echo "Release test passed."
        else
          echo "Test failure: output is $output2"
          exit 1
        fi

    - name: Compress Product
      shell: bash
      run: |
        echo "${{inputs.version}}" >> VERSION.txt
        echo "${{inputs.commit}}" >> VERSION.txt
        mkdir -p temp/include
        cp -a ./v8/v8/include/* ./temp/include
        7z a v8_linux_x64_release.7z ./v8/v8/out/x64.release/obj/libv8_monolith.a ./temp/include VERSION.txt

    - name: Upload Archive
      uses: actions/upload-artifact@v4
      with:
        name: v8_linux_x64_release
        path: |
          *.7z
        retention-days: 7

  arm64-debug:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout This Repo
      uses: actions/checkout@v4
      with:
        clean: true
        fetch-depth: 1

    - name: Prepare
      uses: ./.github/actions/prepare
      with:
        googlesource_gitcookies: ${{secrets.googlesource_gitcookies}}

    - name: Build Sysroot
      shell: bash
      run: |
        mkdir sysroots
        cd sysroots
        sudo apt update
        sudo apt install -y debootstrap qemu-user-static binfmt-support rsync
        sudo debootstrap --variant=minbase --arch=amd64 trixie debian_trixie_amd64-sysroot http://deb.debian.org/debian
        sudo chroot debian_trixie_amd64-sysroot apt-get update
        sudo chroot debian_trixie_amd64-sysroot apt-get install -y --no-install-recommends libc6-dev libstdc++-14-dev zlib1g-dev
        sudo debootstrap --variant=minbase --arch=arm64 trixie debian_trixie_arm64-sysroot http://deb.debian.org/debian
        sudo cp /usr/bin/qemu-aarch64-static debian_trixie_arm64-sysroot/usr/bin/
        sudo chroot debian_trixie_arm64-sysroot apt-get update
        sudo chroot debian_trixie_arm64-sysroot apt-get install -y --no-install-recommends libc6-dev libstdc++-14-dev zlib1g-dev

    - name: Remove Everything
      uses: ./.github/actions/linux-remove-everything

    - name: Fetch V8
      uses: ./.github/actions/fetch-v8
      with:
        commit: ${{inputs.commit}}

    - name: Reinstall arm64 Cross Toolchain
      shell: bash
      run: |
        sudo apt install -y g++-aarch64-linux-gnu gcc-aarch64-linux-gnu libstdc++-14-dev-arm64-cross libgcc-14-dev-arm64-cross

    - name: Apply Linux Patches
      uses: ./.github/actions/linux-patches

    - name: Move Sysroot
      shell: bash
      run: |
        rm -rf v8/v8/build/linux/debian_bullseye_amd64-sysroot
        rm -rf v8/v8/build/linux/debian_bullseye_arm64-sysroot
        sudo mv sysroots/debian_trixie_amd64-sysroot v8/v8/build/linux/debian_bullseye_amd64-sysroot
        sudo mv sysroots/debian_trixie_arm64-sysroot v8/v8/build/linux/debian_bullseye_arm64-sysroot

    - name: Build Linux arm64 Debug
      shell: bash
      run: |
        df -h
        cd v8/v8
        gn gen out/arm64.debug --args='v8_target_cpu="arm64" target_cpu="arm64" use_sysroot=true is_debug=true symbol_level=2 is_clang=true is_component_build=false v8_static_library=true clang_use_chrome_plugins=false v8_enable_pointer_compression=true use_custom_libcxx=false use_custom_libcxx_for_host=true use_clang_modules=false use_glib=false use_lld=true v8_enable_partition_alloc=false v8_monolithic=true v8_use_external_startup_data=false icu_use_data_file=false v8_enable_sandbox=false v8_enable_webassembly=true treat_warnings_as_errors=false enable_iterator_debugging=true v8_enable_verify_heap=true v8_enable_object_print=true v8_enable_backtrace=true v8_enable_temporal_support=false'
        ninja -C out/arm64.debug -j 3 v8_monolith

    - name: Compress Product
      shell: bash
      run: |
        echo "${{inputs.version}}" >> VERSION.txt
        echo "${{inputs.commit}}" >> VERSION.txt
        mkdir -p temp/include
        cp -a ./v8/v8/include/* ./temp/include
        7z a v8_linux_arm64_debug.7z ./v8/v8/out/arm64.debug/obj/libv8_monolith.a ./temp/include VERSION.txt

    - name: Upload Archive
      uses: actions/upload-artifact@v4
      with:
        name: v8_linux_arm64_debug
        path: |
          *.7z
        retention-days: 7

  arm64-release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout This Repo
      uses: actions/checkout@v4
      with:
        clean: true
        fetch-depth: 1

    - name: Prepare
      uses: ./.github/actions/prepare
      with:
        googlesource_gitcookies: ${{secrets.googlesource_gitcookies}}

    - name: Build Sysroot
      shell: bash
      run: |
        mkdir sysroots
        cd sysroots
        sudo apt update
        sudo apt install -y debootstrap qemu-user-static binfmt-support rsync
        sudo debootstrap --variant=minbase --arch=amd64 trixie debian_trixie_amd64-sysroot http://deb.debian.org/debian
        sudo chroot debian_trixie_amd64-sysroot apt-get update
        sudo chroot debian_trixie_amd64-sysroot apt-get install -y --no-install-recommends libc6-dev libstdc++-14-dev zlib1g-dev
        sudo debootstrap --variant=minbase --arch=arm64 trixie debian_trixie_arm64-sysroot http://deb.debian.org/debian
        sudo cp /usr/bin/qemu-aarch64-static debian_trixie_arm64-sysroot/usr/bin/
        sudo chroot debian_trixie_arm64-sysroot apt-get update
        sudo chroot debian_trixie_arm64-sysroot apt-get install -y --no-install-recommends libc6-dev libstdc++-14-dev zlib1g-dev

    - name: Remove Everything
      uses: ./.github/actions/linux-remove-everything

    - name: Fetch V8
      uses: ./.github/actions/fetch-v8
      with:
        commit: ${{inputs.commit}}

    - name: Reinstall arm64 Cross Toolchain
      shell: bash
      run: |
        sudo apt install -y g++-aarch64-linux-gnu gcc-aarch64-linux-gnu libstdc++-14-dev-arm64-cross libgcc-14-dev-arm64-cross

    - name: Apply Linux Patches
      uses: ./.github/actions/linux-patches

    - name: Move Sysroot
      shell: bash
      run: |
        rm -rf v8/v8/build/linux/debian_bullseye_amd64-sysroot
        rm -rf v8/v8/build/linux/debian_bullseye_arm64-sysroot
        sudo mv sysroots/debian_trixie_amd64-sysroot v8/v8/build/linux/debian_bullseye_amd64-sysroot
        sudo mv sysroots/debian_trixie_arm64-sysroot v8/v8/build/linux/debian_bullseye_arm64-sysroot

    - name: Build Linux arm64 Release
      shell: bash
      run: |
        cd v8/v8
        gn gen out/arm64.release --args='v8_target_cpu="arm64" target_cpu="arm64" use_sysroot=true is_debug=false symbol_level=0 is_clang=true is_component_build=false v8_static_library=true clang_use_chrome_plugins=false v8_enable_pointer_compression=true use_custom_libcxx=false use_custom_libcxx_for_host=true use_clang_modules=false use_glib=false use_lld=true v8_enable_partition_alloc=false v8_monolithic=true v8_use_external_startup_data=false icu_use_data_file=false v8_enable_sandbox=false v8_enable_webassembly=true treat_warnings_as_errors=false enable_iterator_debugging=false v8_enable_verify_heap="" v8_enable_object_print="" v8_enable_backtrace="" v8_enable_temporal_support=false'
        ninja -C out/arm64.release -j 3 v8_monolith

    - name: Compress Product
      shell: bash
      run: |
        echo "${{inputs.version}}" >> VERSION.txt
        echo "${{inputs.commit}}" >> VERSION.txt
        mkdir -p temp/include
        cp -a ./v8/v8/include/* ./temp/include
