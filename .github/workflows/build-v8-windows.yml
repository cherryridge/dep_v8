name: Build on Windows

on:
    workflow_call:
        inputs:
            version:
                type: string
                required: true
            commit:
                type: string
                required: true
        secrets:
            googlesource_gitcookies:
                required: true
        outputs:
            runid:
                description: Run ID
                value: ${{github.run_id}}
    workflow_dispatch:
        inputs:
            version:
                type: string
                description: Target version of V8.
                required: true
            commit:
                type: string
                description: Target commit of V8.
                required: true

jobs:
    x64:
        runs-on: windows-latest
        steps:

          - name: Checkout This Repo
            uses: actions/checkout@v4
            with:
                clean: true
                fetch-depth: 1

          - name: Set Global Git Configs
            shell: pwsh
            run: |
                git config --global core.autocrlf false
                git config --global core.filemode false
                git config --global core.longpaths true
                git config --global core.preloadindex true
                git config --global core.fscache true

          - name: Checkout Depot Tools
            uses: newkdev/setup-depot-tools@v1.0.1

          - name: Configure Googlesource auth
            shell: pwsh
            env:
                GOOGLESOURCE_GITCOOKIES: ${{secrets.googlesource_gitcookies}}
            run: |
                if ([string]::IsNullOrWhiteSpace($env:GOOGLESOURCE_GITCOOKIES)) {
                    Write-Host "No Googlesource auth configured."
                    exit 0
                }
                $cookiePath = Join-Path $HOME ".gitcookies"
                Set-Content -Path $cookiePath -Value $env:GOOGLESOURCE_GITCOOKIES -NoNewline
                git config --global http.cookiefile $cookiePath

          - name: Verify Googlesource auth
            shell: pwsh
            run: |
                $cookiePath = Join-Path $HOME ".gitcookies"
                if (-not (Test-Path $cookiePath)) {
                    Write-Host "Skipping auth verification."
                    exit 0
                }
                git ls-remote https://chromium.googlesource.com/a/chromium/src.git HEAD
                if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
                git ls-remote https://chromium.googlesource.com/a/chromium/tools/build.git HEAD
                if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          - name: Checkout V8 Source Code
            shell: cmd
            run: |
                set DEPOT_TOOLS_WIN_TOOLCHAIN=0
                mkdir v8
                cd v8
                fetch --nohooks --no-history v8

          - name: Checkout Target Commit
            shell: pwsh
            run: |
                $env:DEPOT_TOOLS_WIN_TOOLCHAIN=0
                cd v8\v8
                git config branch.autosetupmerge always
                git config branch.autosetuprebase always
                git fetch origin ${{inputs.commit}}
                git checkout ${{inputs.commit}} || exit 1
                git log -1 --format="%H - %s"

          - name: Sync GClient
            shell: cmd
            run: |
                set DEPOT_TOOLS_WIN_TOOLCHAIN=0
                cd v8\v8
                gclient sync -D --no-history --shallow

          - name: Patch V8 for MSVC STL
            shell: pwsh
            run: |
                $V8SourcePath = "v8\v8\src\objects\backing-store.cc"
                $SourceContent = Get-Content -Path $V8SourcePath -Raw
                $Pattern = "(RetryCustomAllocate\s*\(\s*)fn,"
                $Replacement = '$1[&]() { return fn(); },'
                $NewContent = [regex]::Replace($SourceContent, $Pattern, $Replacement)
                if ($NewContent -ne $SourceContent) {
                    Set-Content -Path $V8SourcePath -Value $NewContent -NoNewline
                    Write-Output "Success: Applied lambda wrapper patch to backing-store.cc."
                } else {
                    Write-Error "Critical: Could not find 'RetryCustomAllocate(... fn,' pattern. The source code may have changed."
                    exit 1
                }

          - name: Patch V8 Hashmap for MSVC STL
            shell: pwsh
            run: |
                $hashmapPath = "v8\v8\src\base\hashmap.h"
                $content = Get-Content -Path $hashmapPath -Raw
                $pattern = "(struct HashEqualityThenKeyMatcher \{)"
                $replacement = '$1' + "`n  HashEqualityThenKeyMatcher() : match_(nullptr) {}"
                $newContent = [regex]::Replace($content, $pattern, $replacement)
                if ($newContent -ne $content) {
                    Set-Content -Path $hashmapPath -Value $newContent -NoNewline
                    Write-Output "Success: Applied HashEqualityThenKeyMatcher default constructor patch."
                } else {
                    Write-Error "Critical: Could not find 'HashEqualityThenKeyMatcher' struct. Source may have changed."
                    exit 1
                }

          - name: Patch libc++ debug mode for modern LLVM
            shell: pwsh
            run: |
                $buildFilePath = "v8\v8\build\config\compiler\BUILD.gn"
                $fileContentRaw = Get-Content -Path $buildFilePath -Raw
                $fileContent = $fileContentRaw -replace "`r`n", "`n"
                $replacementLines = @(
                  'if (enable_iterator_debugging) {'
                  '  defines += [ "_LIBCPP_HARDENING_MODE=_LIBCPP_HARDENING_MODE_DEBUG" ]'
                  '} else if (use_safe_libcxx) {'
                  '  defines += [ "_LIBCPP_HARDENING_MODE=_LIBCPP_HARDENING_MODE_EXTENSIVE" ]'
                  '} else {'
                  '  defines += [ "_LIBCPP_HARDENING_MODE=_LIBCPP_HARDENING_MODE_NONE" ]'
                  '}'
                )
                $replacementBlock = $replacementLines -join "`n"
                if ($fileContent.Contains($replacementBlock)) {
                    Write-Output "Success: libc++ debug mode patch is already present in compiler/BUILD.gn."
                    exit 0
                }
                $pattern = 'if \(use_safe_libcxx\)\s*\{\s*defines \+= \[ "_LIBCPP_HARDENING_MODE=_LIBCPP_HARDENING_MODE_EXTENSIVE" \]\s*\}\s*else\s*\{\s*defines \+= \[ "_LIBCPP_HARDENING_MODE=_LIBCPP_HARDENING_MODE_NONE" \]\s*\}'
                $regex = [regex]::new($pattern, [System.Text.RegularExpressions.RegexOptions]::Singleline)
                if (-not $regex.IsMatch($fileContent)) {
                    $context = Select-String -Path $buildFilePath -Pattern 'use_safe_libcxx|_LIBCPP_HARDENING_MODE' -Context 3,3 | Out-String
                    Write-Output "Diagnostic context from compiler/BUILD.gn:"
                    Write-Output $context
                    Write-Error "Critical: Could not find a replaceable libc++ hardening block in compiler/BUILD.gn. The source code may have changed."
                    exit 1
                }
                $newContent = $regex.Replace($fileContent, $replacementBlock, 1)
                if ($newContent -eq $fileContent) {
                    Write-Error "Critical: Failed to apply the libc++ debug mode patch to compiler/BUILD.gn."
                    exit 1
                }
                Set-Content -Path $buildFilePath -Value $newContent -NoNewline
                $verifyContentRaw = Get-Content -Path $buildFilePath -Raw
                $verifyContent = $verifyContentRaw -replace "`r`n", "`n"
                if ($verifyContent.Contains($replacementBlock)) {
                    Write-Output "Success: Applied libc++ debug mode patch to compiler/BUILD.gn."
                } else {
                    Write-Error "Critical: Verification failed after applying the libc++ debug mode patch."
                    exit 1
                }

          - name: Patch Clang constexpr step budget for debug builds
            shell: pwsh
            run: |
                $buildFilePath = "v8\v8\build\config\compiler\BUILD.gn"
                $fileContentRaw = Get-Content -Path $buildFilePath -Raw
                $fileContent = $fileContentRaw -replace "`r`n", "`n"
                $expectedLine = '    cflags_cc += [ "/clang:-fconstexpr-steps=5000000" ]'
                $anchorLine = 'if (is_win && is_clang) {'
                if ($fileContent.Contains($expectedLine)) {
                    Write-Output "Success: Clang constexpr step budget patch is already present in compiler/BUILD.gn."
                    exit 0
                }
                $anchorIndex = $fileContent.IndexOf($anchorLine)
                if ($anchorIndex -lt 0) {
                    Write-Error "Critical: Could not find the expected 'if (is_win && is_clang)' block in compiler/BUILD.gn. The source code may have changed."
                    exit 1
                }
                $insertLines = @(
                  'if (is_win && is_clang) {'
                  '  if (is_debug) {'
                  '    cflags_cc += [ "/clang:-fconstexpr-steps=5000000" ]'
                  '  }'
                )
                $insertBlock = $insertLines -join "`n"
                $newContent =
                  $fileContent.Substring(0, $anchorIndex) +
                  $insertBlock +
                  $fileContent.Substring($anchorIndex + $anchorLine.Length)
                if ($newContent -eq $fileContent) {
                    Write-Error "Critical: Failed to apply the Clang constexpr step budget patch to compiler/BUILD.gn."
                    exit 1
                }
                Set-Content -Path $buildFilePath -Value $newContent -NoNewline
                $verifyContentRaw = Get-Content -Path $buildFilePath -Raw
                $verifyContent = $verifyContentRaw -replace "`r`n", "`n"
                if ($verifyContent.Contains($expectedLine)) {
                    Write-Output "Success: Applied Clang constexpr step budget patch to compiler/BUILD.gn."
                } else {
                    Write-Error "Critical: Verification failed after applying the Clang constexpr step budget patch."
                    exit 1
                }

          - name: Build Windows x64 Debug
            shell: pwsh
            run: |
                $env:DEPOT_TOOLS_WIN_TOOLCHAIN = '0'
                $env:VPYTHON_BYPASS = 'manually managed python not supported by chrome operations'
                cd v8\v8
                gn gen out/x64.debug --args='v8_target_cpu=\"x64\" target_cpu=\"x64\" is_debug=true symbol_level=2 is_clang=true is_component_build=false v8_static_library=true clang_use_chrome_plugins=false v8_enable_pointer_compression=true use_custom_libcxx=false v8_enable_partition_alloc=false v8_monolithic=true v8_use_external_startup_data=false icu_use_data_file=false v8_enable_sandbox=false v8_enable_webassembly=true treat_warnings_as_errors=false enable_iterator_debugging=true v8_enable_verify_heap=true v8_enable_object_print=true v8_enable_temporal_support=false'
                ninja -C out/x64.debug v8_monolith v8_hello_world

          - name: Build Windows x64 Release
            shell: pwsh
            run: |
                $env:DEPOT_TOOLS_WIN_TOOLCHAIN = '0'
                $env:VPYTHON_BYPASS = 'manually managed python not supported by chrome operations'
                cd v8\v8
                gn gen out/x64.release --args='v8_target_cpu=\"x64\" target_cpu=\"x64\" is_debug=false symbol_level=0 is_clang=true is_component_build=false v8_static_library=true clang_use_chrome_plugins=false v8_enable_pointer_compression=true use_custom_libcxx=false v8_enable_partition_alloc=false v8_monolithic=true v8_use_external_startup_data=false icu_use_data_file=false v8_enable_sandbox=false v8_enable_webassembly=true treat_warnings_as_errors=false enable_iterator_debugging=false v8_enable_verify_heap=\"\" v8_enable_object_print=\"\" v8_enable_temporal_support=false'
                ninja -C out/x64.release v8_monolith v8_hello_world

          - name: Test Product
            shell: pwsh
            run: |
                $ErrorActionPreference = "Stop"
                $output1 = .\v8\v8\out\x64.debug\v8_hello_world.exe
                if($output1 -like "Hello, World!*"){
                    Write-Output "Debug test passed."
                }
                else{
                    Write-Error "Test failure: output is $output1"
                    exit 1
                }
                $output2 = .\v8\v8\out\x64.release\v8_hello_world.exe
                if($output2 -like "Hello, World!*"){
                    Write-Output "Release test passed."
                }
                else{
                    Write-Error "Test failure: output is $output2"
                    exit 1
                }

          - name: Compress Product
            shell: pwsh
            run: |
                echo ${{inputs.version}} >> VERSION.txt
                echo ${{inputs.commit}} >> VERSION.txt
                mkdir temp\include
                cp -r .\v8\v8\include\* .\temp\include
                7z a v8_windows_x64_debug.7z .\v8\v8\out\x64.debug\obj\v8_monolith.lib .\temp\include VERSION.txt
                7z a v8_windows_x64_release.7z .\v8\v8\out\x64.release\obj\v8_monolith.lib .\temp\include VERSION.txt

          - name: Upload Archive
            uses: actions/upload-artifact@v4
            with:
                name: v8_windows_x64
                path: |
                    *.7z
                retention-days: 7

