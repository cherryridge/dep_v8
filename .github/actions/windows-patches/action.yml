name: V8 Windows Patches
description: V8 Windows Patches

runs:
  using: composite
  steps:
    - name: Patch V8 Function Type for MSVC STL
      shell: pwsh
      run: |
        $V8SourcePath = "v8\v8\src\objects\backing-store.cc"
        $SourceContent = Get-Content -Path $V8SourcePath -Raw
        $Pattern = "(RetryCustomAllocate\s*\(\s*)fn,"
        $Replacement = '$1[&]() { return fn(); },'
        $NewContent = [regex]::Replace($SourceContent, $Pattern, $Replacement)
        if ($NewContent -ne $SourceContent) {
          Set-Content -Path $V8SourcePath -Value $NewContent -NoNewline
          Write-Output "Success: Applied lambda wrapper patch to backing-store.cc."
        } else {
          Write-Error "Critical: Could not find 'RetryCustomAllocate(... fn,' pattern. The source code may have changed."
          exit 1
        }

    - name: Patch V8 Hashmap for MSVC STL
      shell: pwsh
      run: |
        $hashmapPath = "v8\v8\src\base\hashmap.h"
        $content = Get-Content -Path $hashmapPath -Raw
        $pattern = "(struct HashEqualityThenKeyMatcher \{)"
        $replacement = '$1' + "`n  HashEqualityThenKeyMatcher() : match_(nullptr) {}"
        $newContent = [regex]::Replace($content, $pattern, $replacement)
        if ($newContent -ne $content) {
          Set-Content -Path $hashmapPath -Value $newContent -NoNewline
          Write-Output "Success: Applied HashEqualityThenKeyMatcher default constructor patch."
        } else {
          Write-Error "Critical: Could not find 'HashEqualityThenKeyMatcher' struct. Source may have changed."
          exit 1
        }

    - name: Patch runtime-test atomic_flag for MSVC STL
      shell: pwsh
      run: |
        $runtimeTestPath = "v8\v8\src\runtime\runtime-test.cc"
        $content = Get-Content -Path $runtimeTestPath -Raw
        $oldLine = "  static std::atomic_flag printed_warning{false};"
        $newLine = "  static std::atomic_flag printed_warning = ATOMIC_FLAG_INIT;"
        if ($content.Contains($newLine)) {
          Write-Output "Success: runtime-test.cc atomic_flag initializer patch is already present."
          exit 0
        }
        if (-not $content.Contains($oldLine)) {
          $context = Select-String -Path $runtimeTestPath -Pattern 'printed_warning|atomic_flag' -Context 3,3 | Out-String
          Write-Output "Diagnostic context from runtime-test.cc:"
          Write-Output $context
          Write-Error "Critical: Could not find the replaceable atomic_flag bool initializer in runtime-test.cc. The source code may have changed."
          exit 1
        }
        $newContent = $content.Replace($oldLine, $newLine)
        Set-Content -Path $runtimeTestPath -Value $newContent -NoNewline
        Write-Output "Success: Applied runtime-test.cc atomic_flag initializer patch."

    - name: Patch libc++ debug macro (1)
      shell: pwsh
      run: |
        $buildFilePath = "v8\v8\build\config\compiler\BUILD.gn"
        $fileContentRaw = Get-Content -Path $buildFilePath -Raw
        $fileContent = $fileContentRaw -replace "`r`n", "`n"
        $replacementLines = @(
          'if (enable_iterator_debugging) {'
          '  defines += [ "_LIBCPP_HARDENING_MODE=_LIBCPP_HARDENING_MODE_DEBUG" ]'
          '} else if (use_safe_libcxx) {'
          '  defines += [ "_LIBCPP_HARDENING_MODE=_LIBCPP_HARDENING_MODE_EXTENSIVE" ]'
          '} else {'
          '  defines += [ "_LIBCPP_HARDENING_MODE=_LIBCPP_HARDENING_MODE_NONE" ]'
          '}'
        )
        $replacementBlock = $replacementLines -join "`n"
        if ($fileContent.Contains($replacementBlock)) {
          Write-Output "Success: libc++ debug mode patch is already present in compiler/BUILD.gn."
          exit 0
        }
        $pattern = 'if \(use_safe_libcxx\)\s*\{\s*defines \+= \[ "_LIBCPP_HARDENING_MODE=_LIBCPP_HARDENING_MODE_EXTENSIVE" \]\s*\}\s*else\s*\{\s*defines \+= \[ "_LIBCPP_HARDENING_MODE=_LIBCPP_HARDENING_MODE_NONE" \]\s*\}'
        $regex = [regex]::new($pattern, [System.Text.RegularExpressions.RegexOptions]::Singleline)
        if (-not $regex.IsMatch($fileContent)) {
          $context = Select-String -Path $buildFilePath -Pattern 'use_safe_libcxx|_LIBCPP_HARDENING_MODE' -Context 3,3 | Out-String
          Write-Output "Diagnostic context from compiler/BUILD.gn:"
          Write-Output $context
          Write-Error "Critical: Could not find a replaceable libc++ hardening block in compiler/BUILD.gn. The source code may have changed."
          exit 1
        }
        $newContent = $regex.Replace($fileContent, $replacementBlock, 1)
        if ($newContent -eq $fileContent) {
          Write-Error "Critical: Failed to apply the libc++ debug mode patch to compiler/BUILD.gn."
          exit 1
        }
        Set-Content -Path $buildFilePath -Value $newContent -NoNewline
        $verifyContentRaw = Get-Content -Path $buildFilePath -Raw
        $verifyContent = $verifyContentRaw -replace "`r`n", "`n"
        if ($verifyContent.Contains($replacementBlock)) {
          Write-Output "Success: Applied libc++ debug mode patch to compiler/BUILD.gn."
        } else {
          Write-Error "Critical: Verification failed after applying the libc++ debug mode patch."
          exit 1
        }

    - name: Patch libc++ debug macro (2)
      shell: pwsh
      run: |
        $buildFilePath = "v8\v8\build\config\c++\BUILD.gn"
        $fileContentRaw = Get-Content -Path $buildFilePath -Raw
        $fileContent = $fileContentRaw -replace "`r`n", "`n"
        $replacementLines = @(
          '# Iterator debugging now uses _LIBCPP_HARDENING_MODE in'
          '# //build/config/compiler/BUILD.gn.'
          '# Do not define the legacy libc++ debug macro here because modern'
          '# libc++ removed it.'
        )
        $replacementBlock = $replacementLines -join "`n"
        $pattern = 'if \(enable_iterator_debugging\)\s*\{\s*defines \+= \[ "_LIBCPP_ENABLE_DEBUG_MODE" \]\s*\}'
        $regex = [regex]::new($pattern, [System.Text.RegularExpressions.RegexOptions]::Singleline)
        if ($fileContent.Contains($replacementBlock) -and (-not $regex.IsMatch($fileContent))) {
          Write-Output "Success: removed libc++ debug macro patch is already present in c++/BUILD.gn."
          exit 0
        }
        if (-not $regex.IsMatch($fileContent)) {
          $context = Select-String -Path $buildFilePath -Pattern '_LIBCPP_ENABLE_DEBUG_MODE|enable_iterator_debugging' -Context 3,3 | Out-String
          Write-Output "Diagnostic context from c++/BUILD.gn:"
          Write-Output $context
          Write-Error "Critical: Could not find a replaceable _LIBCPP_ENABLE_DEBUG_MODE block in c++/BUILD.gn. The source code may have changed."
          exit 1
        }
        $newContent = $regex.Replace($fileContent, $replacementBlock, 1)
        if ($newContent -eq $fileContent) {
          Write-Error "Critical: Failed to apply the removed libc++ debug macro patch to c++/BUILD.gn."
          exit 1
        }
        Set-Content -Path $buildFilePath -Value $newContent -NoNewline
        $verifyContentRaw = Get-Content -Path $buildFilePath -Raw
        $verifyContent = $verifyContentRaw -replace "`r`n", "`n"
        if ($verifyContent.Contains($replacementBlock) -and (-not $regex.IsMatch($verifyContent))) {
          Write-Output "Success: Removed deprecated _LIBCPP_ENABLE_DEBUG_MODE define block from c++/BUILD.gn."
        } else {
          Write-Error "Critical: Verification failed after patching c++/BUILD.gn."
          exit 1
        }

    - name: Increase Clang constexpr step budget
      shell: pwsh
      run: |
        $buildFilePath = "v8\v8\build\config\compiler\BUILD.gn"
        $fileContentRaw = Get-Content -Path $buildFilePath -Raw
        $fileContent = $fileContentRaw -replace "`r`n", "`n"
        $expectedLine = '    cflags_cc += [ "/clang:-fconstexpr-steps=5000000" ]'
        $anchorLine = 'if (is_win && is_clang) {'
        if ($fileContent.Contains($expectedLine)) {
          Write-Output "Success: Clang constexpr step budget patch is already present in compiler/BUILD.gn."
          exit 0
        }
        $anchorIndex = $fileContent.IndexOf($anchorLine)
        if ($anchorIndex -lt 0) {
          Write-Error "Critical: Could not find the expected 'if (is_win && is_clang)' block in compiler/BUILD.gn. The source code may have changed."
          exit 1
        }
        $insertLines = @(
          'if (is_win && is_clang) {'
          '  if (is_debug) {'
          '    cflags_cc += [ "/clang:-fconstexpr-steps=5000000" ]'
          '  }'
        )
        $insertBlock = $insertLines -join "`n"
        $newContent =
          $fileContent.Substring(0, $anchorIndex) +
          $insertBlock +
          $fileContent.Substring($anchorIndex + $anchorLine.Length)
        if ($newContent -eq $fileContent) {
          Write-Error "Critical: Failed to apply the Clang constexpr step budget patch to compiler/BUILD.gn."
          exit 1
        }
        Set-Content -Path $buildFilePath -Value $newContent -NoNewline
        $verifyContentRaw = Get-Content -Path $buildFilePath -Raw
        $verifyContent = $verifyContentRaw -replace "`r`n", "`n"
        if ($verifyContent.Contains($expectedLine)) {
          Write-Output "Success: Applied Clang constexpr step budget patch to compiler/BUILD.gn."
        } else {
          Write-Error "Critical: Verification failed after applying the Clang constexpr step budget patch."
          exit 1
        }

    - name: Patch ExtendedMap / JSInterceptorMap layout for MSVC ABI
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        function Normalize-Newlines {
          param([string]$text)
          return ($text -replace "`r`n", "`n")
        }
        function Write-NormalizedFile {
          param(
            [string]$path,
            [string]$text
          )
          Set-Content -Path $path -Value $text -NoNewline
        }
        function Require-Regex {
          param(
            [string]$text,
            [string]$pattern,
            [string]$message
          )
          if (-not [regex]::IsMatch($text, $pattern, [System.Text.RegularExpressions.RegexOptions]::Singleline)) {
            Write-Error $message
            exit 1
          }
        }
        $mapTqPath = "v8\v8\src\objects\map.tq"
        $mapHPath = "v8\v8\src\objects\map.h"
        if (-not (Test-Path $mapTqPath)) {
          Write-Error "Critical: Could not find $mapTqPath"
          exit 1
        }
        if (-not (Test-Path $mapHPath)) {
          Write-Error "Critical: Could not find $mapHPath"
          exit 1
        }
        # 1. Make ExtendedMap own its tail padding in Torque.
        $mapTq = Normalize-Newlines (Get-Content -Path $mapTqPath -Raw)
        Require-Regex `
          -text $mapTq `
          -pattern 'extern class ExtendedMap extends Map' `
          -message "Critical: Could not find ExtendedMap in map.tq. Source layout may have changed."
        $extendedMapTqHasPadding = [regex]::IsMatch(
          $mapTq,
          'extern class ExtendedMap extends Map \{[\s\S]*?extended_padding\[3\]: uint8;[\s\S]*?extended_padding\[7\]: uint8;'
        )
        if ($extendedMapTqHasPadding) {
          Write-Output "Success: ExtendedMap Torque padding is already present."
        } else {
          $extendedMapTqPattern =
            '(extern class ExtendedMap extends Map \{\s*bit_field_ex: ExtendedMapBitFields;\s*)' +
            '(// Leaves kTaggedSize-1 unused bytes, they will be used by subclasses\.\s*)?\}'
          $extendedMapTqReplacement =
            '$1' +
            ' // MSVC ABI: model the rounded sizeof(ExtendedMap) in Torque.' + "`n" +
            ' @ifnot(TAGGED_SIZE_8_BYTES) extended_padding[3]: uint8;' + "`n" +
            ' @if(TAGGED_SIZE_8_BYTES) extended_padding[7]: uint8;' + "`n" +
            '}'
          $regex = [regex]::new($extendedMapTqPattern, [System.Text.RegularExpressions.RegexOptions]::Singleline)
          if (-not $regex.IsMatch($mapTq)) {
            $context = Select-String -Path $mapTqPath -Pattern 'ExtendedMap|bit_field_ex|extended_padding' -Context 4,4 | Out-String
            Write-Output "Diagnostic context from map.tq:"
            Write-Output $context
            Write-Error "Critical: Could not patch ExtendedMap in map.tq."
            exit 1
          }
          $newMapTq = $regex.Replace($mapTq, $extendedMapTqReplacement, 1)
          Write-NormalizedFile -path $mapTqPath -text $newMapTq
          Write-Output "Success: Added ExtendedMap Torque tail padding."
        }
        # 2. Make ExtendedMap own its tail padding in C++.
        $mapH = Normalize-Newlines (Get-Content -Path $mapHPath -Raw)
        Require-Regex `
          -text $mapH `
          -pattern 'class ExtendedMap : public Map' `
          -message "Critical: Could not find ExtendedMap in map.h. Source layout may have changed."
        $extendedMapCppHasPadding = [regex]::IsMatch(
          $mapH,
          'class ExtendedMap : public Map \{[\s\S]*?uint8_t extended_padding_\[kTaggedSize - 1\];'
        )
        if ($extendedMapCppHasPadding) {
          Write-Output "Success: ExtendedMap C++ padding is already present."
        } else {
          $extendedMapCppPattern =
            '(std::atomic<uint8_t> bit_field_ex_;\s*)' +
            '(// Leaves kTaggedSize-1 unused bytes, they will be used by subclasses\.\s*)'
          $extendedMapCppReplacement =
            '$1' +
            '// MSVC ABI: make the abstract base own its rounded tail padding.' + "`n" +
            'uint8_t extended_padding_[kTaggedSize - 1];' + "`n"
          $regex = [regex]::new($extendedMapCppPattern, [System.Text.RegularExpressions.RegexOptions]::Singleline)
          if (-not $regex.IsMatch($mapH)) {
            $context = Select-String -Path $mapHPath -Pattern 'ExtendedMap|bit_field_ex_|extended_padding_' -Context 4,4 | Out-String
            Write-Output "Diagnostic context from map.h:"
            Write-Output $context
            Write-Error "Critical: Could not patch ExtendedMap in map.h."
            exit 1
          }
          $newMapH = $regex.Replace($mapH, $extendedMapCppReplacement, 1)
          Write-NormalizedFile -path $mapHPath -text $newMapH
          Write-Output "Success: Added ExtendedMap C++ tail padding."
        }
        function Remove-JSInterceptorMapTorquePadding {
          param([string]$path)
          if (-not (Test-Path $path)) {
            return $false
          }
          $text = Normalize-Newlines (Get-Content -Path $path -Raw)
          if (-not [regex]::IsMatch($text, 'extern class JSInterceptorMap extends ExtendedMap')) {
            return $false
          }
          $pattern =
            '(extern class JSInterceptorMap extends ExtendedMap \{\s*)' +
            '@ifnot\(TAGGED_SIZE_8_BYTES\)\s+extended_padding\[3\]: uint8;\s*' +
            '@if\(TAGGED_SIZE_8_BYTES\)\s+extended_padding\[7\]: uint8;\s*'
          $regex = [regex]::new($pattern, [System.Text.RegularExpressions.RegexOptions]::Singleline)
          if ($regex.IsMatch($text)) {
            $newText = $regex.Replace($text, '$1', 1)
            Write-NormalizedFile -path $path -text $newText
            Write-Output "Success: Removed JSInterceptorMap Torque padding from $path"
          } else {
            $classBlock = [regex]::Match(
              $text,
              'extern class JSInterceptorMap extends ExtendedMap \{[\s\S]*?\}'
            ).Value
            if ($classBlock -match 'extended_padding\[') {
              Write-Output "Diagnostic JSInterceptorMap Torque block from ${path}:"
              Write-Output $classBlock
              Write-Error "Critical: Found JSInterceptorMap padding, but could not remove it."
              exit 1
            }
            Write-Output "Success: JSInterceptorMap Torque padding is already absent in $path"
          }
          return $true
        }
        function Remove-JSInterceptorMapCppPadding {
          param([string]$path)
          if (-not (Test-Path $path)) {
            return $false
          }
          $text = Normalize-Newlines (Get-Content -Path $path -Raw)
          if (-not [regex]::IsMatch($text, 'class JSInterceptorMap : public ExtendedMap')) {
            return $false
          }
          $pattern =
            '(V8_OBJECT class JSInterceptorMap : public ExtendedMap \{[\s\S]*?)' +
            '\s*uint8_t extended_padding_\[kTaggedSize - 1\];\s*'
          $regex = [regex]::new($pattern, [System.Text.RegularExpressions.RegexOptions]::Singleline)
          if ($regex.IsMatch($text)) {
            $newText = $regex.Replace($text, '$1', 1)
            Write-NormalizedFile -path $path -text $newText
            Write-Output "Success: Removed JSInterceptorMap C++ padding from $path"
          } else {
            $classBlock = [regex]::Match(
              $text,
              'V8_OBJECT class JSInterceptorMap : public ExtendedMap \{[\s\S]*?\} V8_OBJECT_END;'
            ).Value
            if ($classBlock -match 'extended_padding_') {
              Write-Output "Diagnostic JSInterceptorMap C++ block from ${path}:"
              Write-Output $classBlock
              Write-Error "Critical: Found JSInterceptorMap padding, but could not remove it."
              exit 1
            }
            Write-Output "Success: JSInterceptorMap C++ padding is already absent in $path"
          }
          return $true
        }
        # Newer V8 has JSInterceptorMap split into its own files.
        # Older V8 may still keep it in map.tq / map.h.
        $patchedTorqueOwner = $false
        $patchedTorqueOwner = (Remove-JSInterceptorMapTorquePadding "v8\v8\src\objects\js-interceptor-map.tq") -or $patchedTorqueOwner
        $patchedTorqueOwner = (Remove-JSInterceptorMapTorquePadding "v8\v8\src\objects\map.tq") -or $patchedTorqueOwner
        if (-not $patchedTorqueOwner) {
          Write-Error "Critical: Could not find JSInterceptorMap Torque definition."
          exit 1
        }
        $patchedCppOwner = $false
        $patchedCppOwner = (Remove-JSInterceptorMapCppPadding "v8\v8\src\objects\js-interceptor-map.h") -or $patchedCppOwner
        $patchedCppOwner = (Remove-JSInterceptorMapCppPadding "v8\v8\src\objects\map.h") -or $patchedCppOwner
        if (-not $patchedCppOwner) {
          Write-Error "Critical: Could not find JSInterceptorMap C++ definition."
          exit 1
        }
        # Final diagnostics.
        Write-Output "Relevant map.tq context:"
        Select-String -Path $mapTqPath -Pattern 'ExtendedMap|bit_field_ex|extended_padding' -Context 3,3 | Out-String | Write-Output
        Write-Output "Relevant map.h context:"
        Select-String -Path $mapHPath -Pattern 'ExtendedMap|bit_field_ex_|extended_padding_' -Context 3,3 | Out-String | Write-Output
        Write-Output "Success: Applied ExtendedMap / JSInterceptorMap MSVC ABI layout patch."