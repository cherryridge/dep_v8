name: V8 Linux Patches
description: V8 Linux Patches

runs:
  using: composite
  steps:
    - name: Patch wasm shuffle reducer optional fallback
      shell: bash
      run: |
        SHUFFLE_REDUCER_CC="v8/v8/src/compiler/turboshaft/wasm-shuffle-reducer.cc"
        OLD_TEXT='max.value_or({})'
        NEW_TEXT='max.value_or(uint8_t{0})'
        if [ ! -f "$SHUFFLE_REDUCER_CC" ]; then
          echo "V8 wasm shuffle reducer source not found: $SHUFFLE_REDUCER_CC"
          exit 1
        fi
        if grep -Fq "$NEW_TEXT" "$SHUFFLE_REDUCER_CC"; then
          echo "Success: wasm-shuffle-reducer.cc optional fallback patch is already present."
          exit 0
        fi
        if ! grep -Fq "$OLD_TEXT" "$SHUFFLE_REDUCER_CC"; then
          echo "Diagnostic context from wasm-shuffle-reducer.cc:"
          grep -n -E 'value_or|max =|std::optional<uint8_t>' "$SHUFFLE_REDUCER_CC" || true
          echo "Critical: Could not find the replaceable optional fallback in wasm-shuffle-reducer.cc. The source code may have changed."
          exit 1
        fi
        perl -0pi -e 's/max\.value_or\(\{\}\)/max.value_or(uint8_t{0})/g' "$SHUFFLE_REDUCER_CC"
        if grep -Fq "$OLD_TEXT" "$SHUFFLE_REDUCER_CC" || ! grep -Fq "$NEW_TEXT" "$SHUFFLE_REDUCER_CC"; then
          echo "Critical: Verification failed after patching wasm-shuffle-reducer.cc."
          exit 1
        fi
        echo "Success: Applied wasm-shuffle-reducer.cc optional fallback patch."

    - name: Patch V8 Bigint for libstdc++
      shell: bash
      run: |
        BIGINT_H="v8/v8/src/bigint/bigint.h"
        if grep -q '#include <memory>' "$BIGINT_H"; then
          echo "Already patched, skipping."
          exit 0
        fi
        # Insert after the last existing #include line in the file
        sed -i '/#include/a #include <memory>' "$BIGINT_H"
        echo "Success: Added #include <memory> to bigint.h"

    - name: Patch V8 nullptr_t for libstdc++
      shell: bash
      run: |
        V8_INCLUDE_DIR="v8/v8/include"
        if [ ! -d "$V8_INCLUDE_DIR" ]; then
          echo "V8 include directory not found: $V8_INCLUDE_DIR"
          exit 1
        fi
        mapfile -t V8_NULLPTR_FILES < <(
          grep -RIl --include='*.h' -E '(^|[^[:alnum:]_:])nullptr_t([^[:alnum:]_]|$)' "$V8_INCLUDE_DIR" || true
        )
        if [ "${#V8_NULLPTR_FILES[@]}" -eq 0 ]; then
          echo "No bare nullptr_t found, skipping."
          exit 0
        fi
        for file in "${V8_NULLPTR_FILES[@]}"; do
          sed -i -E 's/(^|[^[:alnum:]_:])nullptr_t([^[:alnum:]_]|$)/\1std::nullptr_t\2/g' "$file"
        done
        remaining=$(
          grep -RIn --include='*.h' -E '(^|[^[:alnum:]_:])nullptr_t([^[:alnum:]_]|$)' "$V8_INCLUDE_DIR" || true
        )
        if [ -n "$remaining" ]; then
          echo "Bare nullptr_t remains after patch:"
          echo "$remaining"
          exit 1
        fi
        echo "Success: Replaced bare nullptr_t with std::nullptr_t in ${#V8_NULLPTR_FILES[@]} V8 public header file(s)."