name: Prepare for a building job
description: Prepare for a building job
inputs:
  googlesource_gitcookies:
    description: googlesource_gitcookies
    required: true

runs:
  using: composite
  steps:
    - name: Set Global Git Configs
      shell: bash
      run: |
        git config --global core.autocrlf false
        git config --global core.filemode false
        git config --global core.longpaths true
        git config --global core.preloadindex true
        git config --global core.fscache true

    - name: Check Depot Tools
      uses: newkdev/setup-depot-tools@v1.0.1

    - name: Configure Googlesource auth (Unix-like)
      if: ${{ runner.os != 'Windows' }}
      shell: bash
      env:
        GOOGLESOURCE_GITCOOKIES: ${{inputs.googlesource_gitcookies}}
      run: |
        set -euo pipefail
        if [ -z "${GOOGLESOURCE_GITCOOKIES:-}" ]; then
          echo "No Googlesource auth configured."
          exit 0
        fi
        umask 077
        printf '%s' "$GOOGLESOURCE_GITCOOKIES" > "$HOME/.gitcookies"
        git config --global http.cookiefile "$HOME/.gitcookies"

    - name: Verify Googlesource auth (Unix-like)
      if: ${{ runner.os != 'Windows' }}
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "${GOOGLESOURCE_GITCOOKIES:-}" ]; then
          echo "No Googlesource auth configured."
          exit 0
        fi
        git ls-remote https://chromium.googlesource.com/a/chromium/src.git HEAD
        git ls-remote https://chromium.googlesource.com/a/chromium/tools/build.git HEAD

    - name: Configure Googlesource auth (Windows)
      if: ${{ runner.os == 'Windows' }}
      shell: pwsh
      env:
        GOOGLESOURCE_GITCOOKIES: ${{inputs.googlesource_gitcookies}}
      run: |
        if ([string]::IsNullOrWhiteSpace($env:GOOGLESOURCE_GITCOOKIES)) {
          Write-Host "No Googlesource auth configured."
          exit 0
        }
        $cookiePath = Join-Path $HOME ".gitcookies"
        Set-Content -Path $cookiePath -Value $env:GOOGLESOURCE_GITCOOKIES -NoNewline
        git config --global http.cookiefile $cookiePath

    - name: Verify Googlesource auth (Windows)
      if: ${{ runner.os == 'Windows' }}
      shell: pwsh
      run: |
        $cookiePath = Join-Path $HOME ".gitcookies"
        if (-not (Test-Path $cookiePath)) {
          Write-Host "Skipping auth verification."
          exit 0
        }
        git ls-remote https://chromium.googlesource.com/a/chromium/src.git HEAD
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        git ls-remote https://chromium.googlesource.com/a/chromium/tools/build.git HEAD
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }